# fly.toml app configuration file for NBA Playoffs Highlights

app = "nba-playoffs-viewer-f9538"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Check 1: Express Server Connection
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "2s"

  # Check 2: Database Schema & Seeding Verification
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/api/dbhealth"
    protocol = "http"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "tournament_data"
  destination = "/data"

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/database.sqlite"
  NODE_ENV = "production"
