<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter for Depth -->
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.35" />
    </filter>

    <!-- Basketball Gradient (Vibrant Orange to Red-Orange) -->
    <radialGradient id="basketball-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff9f43" />
      <stop offset="70%" stop-color="#ee5253" />
      <stop offset="100%" stop-color="#c8d6e5" stop-opacity="0.1" /> <!-- Spherical shadow overlay -->
    </radialGradient>

    <!-- Baseball Gradient (Crisp White to Slate Gray) -->
    <radialGradient id="baseball-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="75%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </radialGradient>

    <!-- Soccer Ball Gradient (White Panels Soft Shadow) -->
    <radialGradient id="soccer-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="80%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </radialGradient>

    <!-- Volleyball Gradient (Vibrant White to Light Grey-Blue) -->
    <radialGradient id="volleyball-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </radialGradient>

    <!-- American Football Gradient (Textured Brown to Dark Chocolate) -->
    <radialGradient id="football-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#b86b35" />
      <stop offset="75%" stop-color="#8c471c" />
      <stop offset="100%" stop-color="#54250a" />
    </radialGradient>

    <!-- Ball Clipping Path to ensure perfectly round boundaries -->
    <clipPath id="ball-clip">
      <circle cx="50" cy="50" r="44" />
    </clipPath>

  </defs>

  <style>
    .ball-group {
      transform-origin: 50px 50px;
      opacity: 0;
    }
    
    #basketball-group { animation: cycle-basketball 15s infinite ease-in-out; }
    #baseball-group   { animation: cycle-baseball 15s infinite ease-in-out; }
    #soccer-group     { animation: cycle-soccer 15s infinite ease-in-out; }
    #volleyball-group { animation: cycle-volleyball 15s infinite ease-in-out; }
    #football-group   { animation: cycle-football 15s infinite ease-in-out; }

    @keyframes cycle-basketball {
      0%, 16.67% { opacity: 1; transform: scale(1) rotate(0deg); }
      20%, 96.67% { opacity: 0; transform: scale(0.7) rotate(60deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes cycle-baseball {
      0%, 16.67% { opacity: 0; transform: scale(0.7) rotate(-60deg); }
      20%, 36.67% { opacity: 1; transform: scale(1) rotate(0deg); }
      40%, 100% { opacity: 0; transform: scale(0.7) rotate(60deg); }
    }
    @keyframes cycle-soccer {
      0%, 36.67% { opacity: 0; transform: scale(0.7) rotate(-60deg); }
      40%, 56.67% { opacity: 1; transform: scale(1) rotate(0deg); }
      60%, 100% { opacity: 0; transform: scale(0.7) rotate(60deg); }
    }
    @keyframes cycle-volleyball {
      0%, 56.67% { opacity: 0; transform: scale(0.7) rotate(-60deg); }
      60%, 76.67% { opacity: 1; transform: scale(1) rotate(0deg); }
      80%, 100% { opacity: 0; transform: scale(0.7) rotate(60deg); }
    }
    @keyframes cycle-football {
      0%, 76.67% { opacity: 0; transform: scale(0.7) rotate(-60deg); }
      80%, 96.67% { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.7) rotate(60deg); }
    }
  </style>

  <!-- 1. Basketball -->
  <g id="basketball-group" class="ball-group" filter="url(#premium-shadow)">
    <!-- Base Spherical Surface -->
    <circle cx="50" cy="50" r="44" fill="url(#basketball-grad)" stroke="#1a1c23" stroke-width="2.5" />
    
    <!-- Basketball Seams -->
    <line x1="6" y1="50" x2="94" y2="50" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="6" x2="50" y2="94" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Curved Ribbons -->
    <path d="M18.9 18.9 C34 31 34 69 18.9 81.1" fill="none" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <path d="M81.1 18.9 C66 31 66 69 81.1 81.1" fill="none" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- 2. Baseball -->
  <g id="baseball-group" class="ball-group" filter="url(#premium-shadow)">
    <circle cx="50" cy="50" r="44" fill="url(#baseball-grad)" stroke="#1a1c23" stroke-width="2.5" />
    
    <!-- Red Stitching Curved Seams -->
    <!-- Seam 1 backing and stitches -->
    <path d="M22 15 C38 30 38 70 22 85" fill="none" stroke="#fee2e2" stroke-width="2" />
    <path d="M22 15 C38 30 38 70 22 85" fill="none" stroke="#ee5253" stroke-width="2.5" stroke-dasharray="2 3" stroke-linecap="round" />

    <!-- Seam 2 backing and stitches -->
    <path d="M78 15 C62 30 62 70 78 85" fill="none" stroke="#fee2e2" stroke-width="2" />
    <path d="M78 15 C62 30 62 70 78 85" fill="none" stroke="#ee5253" stroke-width="2.5" stroke-dasharray="2 3" stroke-linecap="round" />
  </g>

  <!-- 3. Soccer Ball -->
  <g id="soccer-group" class="ball-group" filter="url(#premium-shadow)" clip-path="url(#ball-clip)">
    <!-- Base white sphere -->
    <circle cx="50" cy="50" r="44" fill="url(#soccer-grad)" stroke="#1a1c23" stroke-width="2.5" />
    
    <!-- Center Pentagon -->
    <polygon points="50,38 61.4,46.3 57.1,59.7 42.9,59.7 38.6,46.3" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Radiating Seam Lines -->
    <line x1="50" y1="38" x2="50" y2="20" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <line x1="61.4" y1="46.3" x2="76.6" y2="41.4" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <line x1="57.1" y1="59.7" x2="66.5" y2="74.3" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <line x1="42.9" y1="59.7" x2="33.5" y2="74.3" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    <line x1="38.6" y1="46.3" x2="23.4" y2="41.4" stroke="#1a1c23" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Outer Pentagon Panels (Clipped automatically) -->
    <polygon points="50,20 63,11 37,11" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
    <polygon points="76.6,41.4 89,32 85,50" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
    <polygon points="66.5,74.3 80,74 72,87" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
    <polygon points="33.5,74.3 20,74 28,87" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
    <polygon points="23.4,41.4 11,32 15,50" fill="#1a1c23" stroke="#1a1c23" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- 4. Volleyball -->
  <g id="volleyball-group" class="ball-group" filter="url(#premium-shadow)" clip-path="url(#ball-clip)">
    <!-- Base Spherical Surface -->
    <circle cx="50" cy="50" r="44" fill="url(#volleyball-grad)" stroke="#1a1c23" stroke-width="2.5" />
    
    <!-- Main Ribbons -->
    <path d="M 18.9 18.9 C 30 40, 35 60, 50 94" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M 18.9 18.9 C 45 25, 70 30, 94 50" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M 50 94 C 60 70, 80 60, 94 50" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    
    <!-- Ribbon 1 Inner lines -->
    <path d="M 10 32 C 20 50, 25 70, 32 88" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M 6 50 C 14 62, 18 80, 20 82" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    
    <!-- Ribbon 2 Inner lines -->
    <path d="M 32 10 C 50 20, 70 25, 88 32" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M 50 6 C 62 14, 80 18, 82 20" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    
    <!-- Ribbon 3 Inner lines -->
    <path d="M 68 82 C 70 70, 80 50, 90 32" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M 82 68 C 80 62, 85 50, 93 44" stroke="#1a1c23" stroke-width="2.5" fill="none" stroke-linecap="round" />
  </g>

  <!-- 5. American Football -->
  <g id="football-group" class="ball-group" filter="url(#premium-shadow)">
    <!-- Oblong spheriod tilted at 45 degrees -->
    <path d="M 17 81 C 19 36, 36 19, 83 19 C 83 17.5, 82.5 17, 81 17 C 81 64, 64 81, 19 83 C 17 82.5, 18 83.5, 17 81 Z" fill="url(#football-grad)" stroke="#1a1c23" stroke-width="2.5" />
    
    <!-- White Stripes at ends -->
    <path d="M 23 57 C 27 65, 35 73, 43 77" fill="none" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 57 23 C 65 27, 73 35, 77 43" fill="none" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Central Laces Backbone -->
    <line x1="33" y1="67" x2="67" y2="33" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Cross stitches -->
    <line x1="37" y1="57" x2="43" y2="63" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round" />
    <line x1="42" y1="52" x2="48" y2="58" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round" />
    <line x1="47" y1="47" x2="53" y2="53" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round" />
    <line x1="52" y1="42" x2="58" y2="48" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round" />
    <line x1="57" y1="37" x2="63" y2="43" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>